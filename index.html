<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid #00f2ff; padding: 15px; border-radius: 10px; background: rgba(0, 242, 255, 0.05); }
        .card img { width: 100%; height: auto; max-height: 400px; object-fit: contain; border-radius: 5px; margin-bottom: 10px; }
        h1 { text-align: center; border-bottom: 1px solid #00f2ff; padding-bottom: 10px; margin-top: 50px; }
        a { color: #00f2ff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <h3 id="date-display">--/--/----</h3>
    </div>
    
    <div style="text-align: center; margin-bottom: 30px;">
    <img src="shengjia.jpg" alt="Ye Shengjia" style="width: 200px; height: 200px; border-radius: 50%; border: 2px solid #00f2ff; object-fit: cover;">
    </div>

    <h1>YE SHENGJIA'S DRAMA ARCHIVE</h1>
    <div id="gallery" class="gallery"></div>
    
    <h1>UPCOMING DRAMA TRAILERS</h1>
    <div id="trailers" class="gallery">
        <div class="card">
            <h2>Live Long And Prosper</h2>
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/M3tWvYOPjFI" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <h1>SPECIAL FEATURES</h1>
    <div class="gallery">
        <div class="card">
            <h2>Subbed Interview</h2>
            <p>Exclusive fan-translated interview clip.</p>
            <p><a href="https://rumble.com/embed/v7akoae/?pub=4pghjk" target="_blank">[ Watch on Rumble ]</a></p>
        </div>
    </div>

    <script>
    // 1. Show date automatically when page loads
    window.onload = function() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('date-display').innerText = "Archive Status: " + dateStr;
    };

    // 2. ONLY the date display triggers the sound
    const dateElement = document.getElementById('date-display');
    dateElement.style.cursor = "pointer"; // Makes it look clickable
    dateElement.addEventListener('click', function() {
        const dateText = dateElement.innerText;
        const msg = new SpeechSynthesisUtterance(dateText);
        window.speechSynthesis.speak(msg);
    }, { once: true });

        const dramas = [
            { title: "Endless Eighteen", year: "2019", platform: "Tencent", role: "Lead Actor", poster: "ENDLESS EIGHTEEN.jpg" },
            { title: "A Love So Romantic", year: "2020", platform: "WeTV (Tencent)", role: "Lead Actor", poster: "A LOVE SO ROMANTIC.jpg" },
            { title: "Mirror: A Tale of Twin Cities", year: "2022", platform: "WeTV (Tencent)", role: "Supporting Actor", poster: "MIRROR A TALE OF TWIN CITIES.jpg" },
            { title: "Hello my love", year: "2022", platform: "Iqiyi", role: "Supporting Actor", poster: "HELLO MY LOVE.jpg" },
            { title: "My marvellous fable", year: "2023", platform: "Mangotv", role: "Supporting Actor", poster: "MY MARVELLOUS FABLE.jpg" },
            { title: "The longest promise", year: "2023", platform: "WeTV (Tencent)", role: "Supporting Actor", poster: "THE LONGEST PROMISE.jpg" },
            { title: "The legend of ZhuoHua", year: "2023", platform: "WeTV (Tencent)", role: "Supporting Actor", poster: "THE LEGEND OF ZHUOHUA.jpg" },
            { title: "Fortune Writer", year: "2024", platform: "WeTV (Tencent)", role: "Lead Actor", poster: "FORTUNE WRITER.jpg" },
            { title: "Sword and fairy 1", year: "2024", platform: "WeTV (Tencent)", role: "Supporting Actor", poster: "SWORD AND FAIRY 1.jpg" },
            { title: "Blossom", year: "2024", platform: "WeTV (Tencent)", role: "Supporting Actor", poster: "BLOSSOM.jpg" },
            { title: "The Rebirth", year: "2025", platform: "Sohu", role: "Lead Actor", poster: "THE REBIRTH.jpg" },
            { title: "The Glided Vortex", year: "2025", platform: "Kuai Shou", role: "Lead Actor", poster: "THE GLIDED VORTEX.jpg" },
            { title: "Dragon King's Decree", year: "2025", platform: "WeTV (Tencent)", role: "Lead Actor", poster: "DRAGON KING'S DECREE.jpg" },
            { title: "The Eternal Fragrance", year: "2026", platform: "Youku", role: "Supporting Actor", poster: "ETERNAL FRAGRANCE.jpg" },
            { title: "Live Long And Prosper", year: "2026 (Upcoming)", platform: "Mangotv", role: "Supporting Actor", poster: "LIVE LONG AND PROSPER.jpg" }
        ];

        const gallery = document.getElementById('gallery');
        dramas.forEach(drama => {
            gallery.innerHTML += `
                <div class="card">
                    <img src="${drama.poster}" alt="${drama.title}">
                    <h2>${drama.title}</h2>
                    <p>Year: ${drama.year} | ${drama.role}</p>
                    <p style="color: #ff00ff;">Platform: ${drama.platform}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
