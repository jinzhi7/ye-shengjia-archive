<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid #00f2ff; padding: 15px; border-radius: 10px; background: rgba(0, 242, 255, 0.05); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        h1 { text-align: center; border-bottom: 1px solid #00f2ff; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>YE SHENGJIA ARCHIVE</h1>
    <div id="gallery" class="gallery"></div>

    <script>
        const dramas = [
            { title: "Endless Eighteen", year: "2019", platform: "Tencent", role: "Lead Actor", poster: " https://i.mydramalist.com/dYA1zf.jpg" },
{ title: "A Love So Romantic", year: "2020", platform: "WeTV (Tencent)", role: "Lead Actor", poster: "https://i.mydramalist.com/rXvXp_4f.jpg" },
{ title: "Mirror: A Tale of Twin Cities", year: "2022", platform: "WeTV (Tencent)", role: "Supporting Actor" },
            { title: "Hello my love", year: "2022", platform: "Iqiyi", role: "Supporting Actor" },
            { title: "My marvellous fable", year: "2023", platform: "Mangotv", role: "Supporting Actor" },
            { title: "The longest promise", year: "2023", platform: "WeTV (Tencent)", role: "Supporting Actor" },
            { title: "Zhuo Zhuo Feng Liu", year: "2023", platform: "WeTV (Tencent)", role: "Supporting Actor" },
            { title: "Fortune Writer", year: "2024", platform: "WeTV (Tencent)", role: "Lead Actor" },
            { title: "Sword and fairy 1", year: "2024", platform: "WeTV (Tencent)", role: "Supporting Actor" },
            { title: "Blossom", year: "2024", platform: "WeTV (Tencent)", role: "Supporting Actor" },
            { title: "The Rebirth", year: "2025", platform: "Sohu", role: "Lead Actor" },
            { title: "The Glided Vortex", year: "2025", platform: "Kuai Shou", role: "Lead Actor" },
            { title: "Dragon King's Decree", year: "2025", platform: "WeTV (Tencent)", role: "Lead Actor" },
            { title: "Eternal Fragrance", year: "2026 (Upcoming)", platform: "Youku", role: "Supporting Actor" },
            { title: "Live Long And Prosper", year: "2026 (Upcoming)", platform: "Mangotv", role: "Supporting Actor" }
        ];

        const gallery = document.getElementById('gallery');
        dramas.forEach(drama => {
            gallery.innerHTML += `
                <div class="card">
                    <img src="${drama.poster}" alt="${drama.title}">
                    <h2>${drama.title}</h2>
                    <p>Year: ${drama.year} | ${drama.role}</p>
                    <p style="color: #ff00ff;">Platform: ${drama.platform}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
